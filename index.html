<style>
/* ===== HERO SLIDESHOW ===== */

#hero{
  position:relative;
  overflow:hidden;
  min-height:100vh;
}

/* slideshow container */
.hero-slideshow{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
}

/* each slide */
.hero-slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center 30%;
  opacity:0;
  transform:scale(1.05);
  transition:opacity 1.8s ease-in-out, transform 6s ease;
  filter:saturate(1.05) contrast(1.1);
}

/* active slide */
.hero-slide.active{
  opacity:1;
  transform:scale(1);
}

/* overlay */
.hero-slideshow::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 50% 0%,
      rgba(10,40,90,.15) 0%,
      rgba(20,20,60,.25) 55%,
      rgba(42,4,16,.40) 100%),
    linear-gradient(180deg,
      rgba(10,25,70,.18) 0%,
      rgba(42,4,16,.25) 60%,
      rgba(242,235,217,.88) 100%);
  z-index:1;
}

.hero-slideshow::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, rgba(239,175,0,.16) 0%, transparent 45%, rgba(239,175,0,.10) 100%);
  mix-blend-mode:overlay;
  z-index:2;
}

/* ensure content is above slideshow */
#hero > *:not(.hero-slideshow){
  position:relative;
  z-index:2;
}

.hero-caption{
  position:absolute;
  bottom:120px;
  right:40px;
  z-index:3;
  color:white;
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  letter-spacing:.08em;
  background:rgba(0,0,0,.25);
  padding:10px 16px;
  border-radius:10px;
  backdrop-filter: blur(6px);
}

/* reduced motion */
@media (prefers-reduced-motion: reduce){
  .hero-slide{
    transition:none;
    transform:none;
  }
}
</style>

<script>
/* NAV */
const navToggle = document.getElementById('nav-toggle');
const navMenu = document.getElementById('nav-menu');
const navEl = document.getElementById('nav');

navToggle.addEventListener('click', () => {
  const isOpen = navEl.classList.toggle('open');
  navToggle.setAttribute('aria-expanded', isOpen);
});

/* SLIDESHOW ENGINE */
const slides = document.querySelectorAll('.hero-slide');
const captions = [
  "The Beginning — 2013",
  "Growing in Grace",
  "Voices United in Worship",
  "Laus Deo Journey",
  "Laus Deo '24 Memories",
  "Preparing for '26 Celebration"
];

let current = 0;
const captionBox = document.getElementById("heroCaption");

function showSlide(index){
  slides.forEach(s => s.classList.remove('active'));
  slides[index].classList.add('active');

  if(captionBox){
    captionBox.textContent = captions[index] || "";
  }
}

function nextSlide(){
  current = (current + 1) % slides.length;
  showSlide(current);
}

showSlide(0);
setInterval(nextSlide, 6000);

/* COUNTDOWN */
const eventDate = new Date("June 27, 2026 17:00:00").getTime();

function tick(){
  const now = Date.now();
  const d = eventDate - now;

  if(d < 0){
    document.getElementById('countdown').innerHTML =
    "<div style='color:gold'>THE CONCERT HAS BEGUN ✦</div>";
    return;
  }

  const days = Math.floor(d/(1000*60*60*24));
  const hours = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const mins = Math.floor((d%(1000*60*60))/(1000*60));
  const secs = Math.floor((d%(1000*60))/1000);

  document.getElementById('countdown').innerHTML = `
    <div>
      <div>${days} Days ${hours} Hrs ${mins} Min ${secs} Sec</div>
    </div>
  `;
}

tick();
setInterval(tick, 1000);

</script>
